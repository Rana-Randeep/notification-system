spring.application.name=notification-system

# ==========================

# Database Configuration

# Replace the values below with your local database configuration.

# ==========================

spring.datasource.url=jdbc:mysql://localhost:3306/notification_db
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================

# JPA Configuration

# ==========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================

# AWS Configuration

# Replace the placeholder values below with your AWS resources and credentials.

# ==========================

aws.region=ap-south-1
aws.accessKeyId=your_aws_access_key
aws.secretAccessKey=your_aws_secret_access_key
aws.sns.topicArn=your_sns_topic_arn

# ==========================

# AWS SQS

# Replace the queue URLs with your own SQS queue URLs.

# ==========================

aws.sqs.emailQueueUrl=your_email_queue_url
aws.sqs.smsQueueUrl=your_sms_queue_url
aws.sqs.pushQueueUrl=your_push_queue_url

# ==========================

# Mail Configuration

# Use your Gmail address and App Password.

# ==========================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=[your_email@gmail.com](mailto:your_email@gmail.com)
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================

# Server Configuration

# ==========================

server.port=8080

# ==========================

# Spring AI (Ollama)

# Ensure Ollama is running locally before starting the application.

# ==========================

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
